<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário De Adoção</title>
</head>

<body>
    <h2>Formulário de Adoção</h2>
    <form id="formAdocao">

        <label for="nome">Nome :</label>
        <input type="text" id="nome" placeholder="Digite seu nome">
        <br>

        <label for="email">Email :</label>
        <input type="email" id="email" placeholder="Digite seu email">
        <br>

       <label for="Telefone">Telefone :</label>
       <input type="telefone" id="Telefone" placeholder="Digite seu Telefone">
       <br>

        <label for="cpf">cpf:</label>
        <input type="cpf" id="cpf" placeholder="Digite seu cpf">
        <br>

        <label for="idade">idade:</label>
        <input type="idade" id="idade" placeholder="Digite seu idade">
        <br>

        <label for="cidade">cidade:</label>
        <input type="cidade" id="cidade" placeholder="Digite seu cidade">
        <br>

        <label for="moradia">Moradia :</label>
        <select name="moradia" id="moradia">
            <option value=""> Selecione</option>
            <option value="casa">Casa</option>
            <option value="apartamento">Apartamento</option>
        </select>
        <br>

        <label for="quintal">Possui Quintal ?</label>
                <input type="radio" name="quintal" value="sim">Sim
                <input type="radio" name="quintal" value="nao">Não
                <br>
                <button type="submit">Enviar</button>
        <br>
        
        <label for="quintal">Possui Quintal ?</label>

                <input type="radio" name="quintal" value="nao">Não
                <br>
                <button type="submit">Enviar</button>




    </form>

</body>
</html>
