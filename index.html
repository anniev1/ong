<html lang="en">

<head>
   <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário De Adoção</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h2>Formulário de Adoção</h2>
    <form id="formAdocao">

        <label for="nome">Nome :</label>
        <input type="text" id="nome" placeholder="Digite seu nome">
        <br>
        <br>

        <label for="email">Email :</label>
        <input type="email" id="email" placeholder="Digite seu email">
        <br>
        <br>

        <label for="Telefone">Telefone :</label>
        <input type="text" id="Telefone" placeholder="Digite seu Telefone">
        <br>
        <br>

        <label for="cpf">cpf:</label>
        <input type="text" id="cpf" placeholder="Digite seu cpf">
        <br>
        <br>

       <label for="idade">idade:</label>
        <input type="number" id="idade" placeholder="digite sua idade...">
        <br>
        <br>


        <label for="cidade">cidade:</label>
        <input type="text" id="cidade" placeholder="Digite sua cidade">
        <br>
        <br>

        <label for="moradia">Moradia:</label>
        <select name="moradia" id="moradia">
            <option value=""> Selecione</option>
            <option value="casa">Casa</option>
            <option value="apartamento">Apartamento</option>
        </select>
        <br>
        <br>


        <label for="quintal">Possui Quintal ?</label>
        <input type="radio" name="quintal" value="sim">Sim
        <input type="radio" name="quintal" value="nao">Não
        <br>
        <br>

        <label for="antes">Já teve pet antes?</label>
        <input type="radio" name="antes" value="sim">Sim
        <input type="radio" name="antes" value="nao">Não
        <br>

        <br>

        <label for="dia">Quantas horas o animal ficará sozinho por
            dia?:</label>
        <input type="number" id="dia"
            placeholder="Digite quantas horas...">
        <br>
        <br>

        <label for="Motivo da adoção">Motivo da adoção:</label>
        <textarea id="text" placeholder="Digite seu motivo"></textarea>
        <br>
        <br>

        <label for="Aceite do termo de responsabilidade">Aceite do termo de responsabilidade</label>
        <input type="checkbox" id="sim" name="sim" value="option1">
        <br>
        <br>



<button type="submit">Enviar</button>

    </form>
    <div id="resultado"></div>
    <script src="scripts/script.js"></script>
</body>

</html>
