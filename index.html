<body>

            <div>

    <mein>
<br>
<br>
    <form id="formAdocao">

        <label for="nome">Nome :</label>
        <input type="text" id="nome" placeholder="Digite seu nome">
        <br>
        <br>

        <label for="email">Email :</label>
        <input type="email" id="email" placeholder="Digite seu email">
        <br>
        <br>

        <label for="Telefone">Telefone :</label>
        <input type="text" id="Telefone" placeholder="Digite seu Telefone">
        <br>
        <br>

        <label for="Cpf">cpf:</label>
        <input type="text" id="cpf" placeholder="Digite seu cpf">
        <br>
        <br>

       <label for="Idade">idade:</label>
        <input type="number" id="idade" placeholder="digite sua idade...">
        <br>
        <br>


        <label for="Cidade">Cidade:</label>
        <input type="text" id="cidade" placeholder="Digite sua cidade">
        <br>
        <br>

        <label for="Moradia">Moradia:</label>
        <select name="moradia" id="moradia">
            <option value=""> Selecione</option>
            <option value="casa">Casa</option>s
            <option value="apartamento">Apartamento</option>
        </select>
        <br>
        <br>


        <label for="Quintal">Possui Quintal ?</label>
        <input type="radio" name="quintal" value="sim">Sim
        <input type="radio" name="quintal" value="nao">Não
        <br>
        <br>

        <label for="Antes">Já teve pet antes?</label>
        <input type="radio" name="antes" value="sim">Sim
        <input type="radio" name="antes" value="nao">Não
        <br>

        <br>

        <label for="Horas">Quantas horas o animal ficará sozinho por dia?:</label>
        <input type="number" id="horas" placeholder="Digite Quantas horas...">
        <br>
        <br>
    

        <label for="Motivo ">Motivo da adoção?:</label>
        <textarea id="Motivo" placeholder="Digite seu motivo"></textarea>
        <br>
        <br>

       <label for="responsabilidade">Aceite do termo de responsabilidade</label>
        <input type="checkbox" id="sim" name="sim" value="option1">
         <br>
         <br>



<button type="submit">Enviar</button>

    </form>
